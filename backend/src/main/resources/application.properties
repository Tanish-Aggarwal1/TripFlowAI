spring.config.import=optional:file:.env[.properties]
spring.application.name=backend
# Server
server.port=8080

# Database (local dev Pratham will add cloud values later)
spring.datasource.url=jdbc:postgresql://localhost:5432/tripflow
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRY_MS}

# OpenRouteService (key in .env - quota: 500 req/day on free tier)
ors.base-url=https://api.openrouteservice.org
ors.api-key=${ORS_API_KEY}
ors.connect-timeout=5s
ors.read-timeout=15s

# HTTP
spring.http.clients.connect-timeout=5s
spring.http.clients.read-timeout=15s

# Actuator Health
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never