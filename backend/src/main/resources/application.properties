spring.config.import=optional:file:.env[.properties]
spring.application.name=backend
spring.profiles.default=dev

# Server
server.port=8080

# Database (local dev Pratham will add cloud values later)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRY_MS:3600000}

# OpenRouteService (key in .env - quota: 500 req/day on free tier)
ors.base-url=https://api.openrouteservice.org
ors.api-key=${ORS_API_KEY}
ors.connect-timeout=5s
ors.read-timeout=15s

# HTTP
spring.http.clients.connect-timeout=5s
spring.http.clients.read-timeout=15s

# Actuator Health
management.endpoints.web.exposure.include=health,metrics
# Explicit disable — belt-and-braces against future Boot defaults changing:
management.endpoints.web.exposure.exclude=env,beans,heapdump,threaddump,configprops
management.endpoint.health.show-details=never

# Gemini
app.gemini.base-url=https://generativelanguage.googleapis.com
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.model=gemini-2.5-flash
app.gemini.connect-timeout=5s
app.gemini.read-timeout=30s