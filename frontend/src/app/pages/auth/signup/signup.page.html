<ion-content class="ion-padding">
  <div class="signup-card">
    <img src="assets/logo.svg" alt="TripFlow AI" class="logo" />
    <h1>Create Account</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <ion-item>
        <ion-label position="floating">Display Name</ion-label>
        <ion-input formControlName="username" type="text"></ion-input>
      </ion-item>
      <ion-text color="danger" *ngIf="fieldError('username')">
        <p>{{ fieldError('username') }}</p>
      </ion-text>

      <ion-item>
        <ion-label position="floating">Email</ion-label>
        <ion-input formControlName="email" type="email"></ion-input>
      </ion-item>
      <ion-text color="danger" *ngIf="fieldError('email')">
        <p>{{ fieldError('email') }}</p>
      </ion-text>

      <ion-item>
        <ion-label position="floating">Password</ion-label>
        <ion-input formControlName="password" type="password"></ion-input>
      </ion-item>
      <ion-text color="danger" *ngIf="fieldError('password')">
        <p>{{ fieldError('password') }}</p>
      </ion-text>

      <ion-item>
        <ion-label position="floating">Confirm Password</ion-label>
        <ion-input formControlName="confirmPassword" type="password"></ion-input>
      </ion-item>
      <ion-text color="danger" *ngIf="passwordMismatch">
        <p>Passwords do not match.</p>
      </ion-text>

      <ion-text color="danger" *ngIf="generalError">
        <p>{{ generalError }}</p>
      </ion-text>

      <ion-button expand="block" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Creating account...' : 'Create Account' }}
      </ion-button>
    </form>

    <ion-text>
      Already have an account? <a routerLink="/login">Log in</a>
    </ion-text>
  </div>
</ion-content>
