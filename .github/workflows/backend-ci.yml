name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: bash mvnw -B verify -Pci

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 14

      - name: Post JaCoCo PR comment
        if: always() && github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/backend/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Backend coverage
          # TEMP placeholder — Actions was queued/down when this was written, so there's
          # no real coverage number to lock yet. Once a run succeeds, check the JaCoCo
          # PR comment's overall %, set min-coverage-overall a few points below it (never
          # above), and min-coverage-changed-files something reasonable like 70-80.
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          update-comment: true