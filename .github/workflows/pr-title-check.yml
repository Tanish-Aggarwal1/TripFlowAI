name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: read

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      # Automated dependency bumps (Dependabot) aren't tied to a Jira ticket,
      # so they're exempt from the [SCRUM-XXX] tag requirement below.
      # This step (not a job-level `if:`) so the job always runs and reports
      # a status — a job skipped via job-level `if:` can leave a required
      # check permanently "waiting" instead of passing.
      - name: Skip title validation for automated bots
        if: github.actor == 'dependabot[bot]' || github.actor == 'github-actions[bot]'
        run: echo "Skipping PR title format check for ${{ github.actor }} — automated PRs aren't tied to a Jira ticket."

      - name: Validate PR title format
        if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'
        uses: actions/github-script@v9
        with:
          script: |
            const title = context.payload.pull_request.title;
            const pattern = /^\[SCRUM-\d+\] (feat|fix|docs|test|ref|refactor|perf|chore|ci|build|style)(\([a-z0-9.\-]+\))?: .+$/;

            if (!pattern.test(title)) {
              core.setFailed(
                `PR title "${title}" doesn't match the required format.\n\n` +
                `Expected: [SCRUM-XXX] type(scope): message\n` +
                `Example:  [SCRUM-182] ci(conventions): enforce PR title format\n\n` +
                `Allowed types: feat, fix, docs, test, ref, refactor, perf, chore, ci, build, style`
              );
            } else {
              core.info(`PR title "${title}" is valid.`);
            }