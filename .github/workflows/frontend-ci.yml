name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
  push:
    branches: [main]
    paths:
      - "frontend/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:ci
      - run: npm run build

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: karma-coverage-report
          path: frontend/coverage/app/
          retention-days: 14

      - name: Post coverage PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'frontend/coverage/app/coverage-summary.json';
            if (!fs.existsSync(summaryPath)) {
              console.log('No coverage-summary.json found, skipping comment.');
              return;
            }
            const t = JSON.parse(fs.readFileSync(summaryPath, 'utf8')).total;
            const pct = (m) => `${m.pct}% (${m.covered}/${m.total})`;
            const marker = '<!-- frontend-coverage-comment -->';
            const body = [
              marker,
              '### Frontend Coverage (Karma)',
              '',
              '| Metric | Coverage |',
              '|---|---|',
              `| Statements | ${pct(t.statements)} |`,
              `| Branches | ${pct(t.branches)} |`,
              `| Functions | ${pct(t.functions)} |`,
              `| Lines | ${pct(t.lines)} |`,
              '',
              '_Full HTML report attached as a workflow artifact._'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }