name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
  push:
    branches: [main]
    paths:
      - "frontend/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:ci
      - run: npm run build

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: karma-coverage-report
          path: frontend/coverage/app/
          retention-days: 14

      - name: Setup LCOV
        if: always() && github.event_name == 'pull_request'
        uses: hrishikesh-kadam/setup-lcov@v1

      - name: Post coverage PR comment
        if: always() && github.event_name == 'pull_request'
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: frontend/coverage/app/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: frontend
          update-comment: true
          ignore-errors: true  # Add this to ignore LCOV errors
          # TEMP: no frontend coverage baseline exists yet — informational only,
          # same reasoning as SCRUM-136 for backend. Once a real PR run reports
          # a number, raise this a few points below actual (never above).
          minimum-coverage: 0